services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cleancity-api
    container_name: cleancity-app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - cleancity-net
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: mysql:8.0
    container_name: cleancity-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-clean_city}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - cleancity-db-data:/var/lib/mysql
    networks:
      - cleancity-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cleancity-reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    networks:
      - cleancity-net
    depends_on:
      - app
    env_file:
      - .env

networks:
  cleancity-net:
    driver: bridge

volumes:
  cleancity-db-data:
    driver: local
