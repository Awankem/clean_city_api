$kind: http-request
name: Logout
method: POST
url: '{{base_url}}/logout'
order: 9000
headers:
  - key: Accept
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{auth_token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response message is Logged out successfully", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.message).to.eql("Logged out successfully");
      });
